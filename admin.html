<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h1>Admin Dashboard</h1>

<h2>Registered Clients</h2>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
        </tr>
    </thead>

    <tbody id="usersTable">

    </tbody>

</table>

<script>

fetch("http://localhost:3000/users")

.then(response => response.json())

.then(data => {

    let rows = "";

    data.forEach(user => {

        rows += `
        <tr>
            <td>${user.id}</td>
            <td>${user.fullname}</td>
            <td>${user.email}</td>
        </tr>
        `;

    });

    document.getElementById("usersTable").innerHTML = rows;

});

</script>

</body>
</html>
